<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspección Bomberos</title>

<style>
body{font-family:Arial;margin:0;background:#f0f0f0}
.header{background:#d32f2f;color:white;padding:15px;text-align:center;font-weight:bold;font-size:18px}
.container{padding:15px}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:10px;box-shadow:0 2px 5px rgba(0,0,0,0.2)}
input,textarea,select{width:100%;padding:10px;margin-top:5px;border-radius:6px;border:1px solid #ccc;box-sizing:border-box}
button{padding:12px;border:none;border-radius:6px;background:#d32f2f;color:white;width:100%;margin-top:8px;font-weight:bold}
.btn-float{position:fixed;bottom:20px;right:20px;background:#d32f2f;color:white;width:60px;height:60px;border-radius:50%;font-size:30px;border:none;box-shadow:0 4px 10px rgba(0,0,0,.3)}
.estado{padding:5px 10px;border-radius:5px;color:white;font-size:12px;float:right}
.pendiente{background:orange}
canvas{border:1px solid #ccc;border-radius:6px;width:100%;height:200px}
#panel{display:none}
</style>

</head>
<body>

<div class="header">INSPECCIÓN BOMBEROS</div>

<div class="container" id="loginBox">
<div class="card">
<h3>Login</h3>
<input type="text" id="usuario" placeholder="Usuario">
<input type="password" id="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
</div>
</div>

<div class="container" id="panel">

<div class="card">
<h3>Nueva Inspección</h3>

<input id="nombre" placeholder="Nombre establecimiento">
<input id="direccion" placeholder="Dirección">
<input id="responsable" placeholder="Responsable">
<input id="telefono" placeholder="Teléfono">

<label>Extintores</label>
<select id="extintores">
<option>SI</option>
<option>NO</option>
</select>

<label>Salidas</label>
<select id="salidas">
<option>SI</option>
<option>NO</option>
</select>

<textarea id="obs" placeholder="Observaciones"></textarea>

<label>Foto</label>
<input type="file" accept="image/*" id="foto">
<img id="preview" style="width:100%;margin-top:5px">

<label>Firma</label>
<canvas id="firma"></canvas>
<button onclick="limpiarFirma()">Limpiar firma</button>

<button onclick="guardar()">Guardar</button>

</div>

<h3>Inspecciones</h3>
<div id="lista"></div>

</div>

<button class="btn-float" onclick="window.scrollTo({top:0,behavior:'smooth'})">+</button>

<script>

let canvas, ctx, dibujando=false;

window.onload=function(){

canvas=document.getElementById("firma");
ctx=canvas.getContext("2d");

canvas.addEventListener("mousedown",()=>dibujando=true);
canvas.addEventListener("mouseup",()=>dibujando=false);
canvas.addEventListener("mousemove",dibujar);

canvas.addEventListener("touchstart",()=>dibujando=true);
canvas.addEventListener("touchend",()=>dibujando=false);
canvas.addEventListener("touchmove",dibujarTouch);

document.getElementById("foto").addEventListener("change",function(e){
let reader=new FileReader();
reader.onload=function(){
document.getElementById("preview").src=reader.result;
}
reader.readAsDataURL(e.target.files[0]);
});

}

function dibujar(e){
if(!dibujando) return;
ctx.lineWidth=2;
ctx.lineCap="round";
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(e.offsetX,e.offsetY);
}

function dibujarTouch(e){
if(!dibujando) return;
let rect=canvas.getBoundingClientRect();
let x=e.touches[0].clientX-rect.left;
let y=e.touches[0].clientY-rect.top;
ctx.lineWidth=2;
ctx.lineCap="round";
ctx.lineTo(x,y);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(x,y);
}

function limpiarFirma(){
ctx.clearRect(0,0,canvas.width,canvas.height);
}

function login(){
let user=document.getElementById("usuario").value;
let pass=document.getElementById("password").value;

if(user==="admin" && pass==="1996"){
document.getElementById("loginBox").style.display="none";
document.getElementById("panel").style.display="block";
mostrar();
}else{
alert("Usuario o contraseña incorrectos");
}
}

function guardar(){

let data=JSON.parse(localStorage.getItem("inspecciones")||"[]");

let item={
nombre:document.getElementById("nombre").value,
direccion:document.getElementById("direccion").value,
responsable:document.getElementById("responsable").value,
telefono:document.getElementById("telefono").value,
fecha:new Date().toLocaleString()
};

data.push(item);
localStorage.setItem("inspecciones",JSON.stringify(data));
mostrar();
}

function mostrar(){

let data=JSON.parse(localStorage.getItem("inspecciones")||"[]");
lista.innerHTML="";

data.slice().reverse().forEach(i=>{
lista.innerHTML+=`
<div class="card">
<span class="estado pendiente">Pendiente</span>
<b>${i.nombre}</b><br>
${i.direccion}<br>
${i.fecha}
</div>
`;
});

}

</script>

</body>
</html>
