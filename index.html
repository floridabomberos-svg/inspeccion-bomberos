<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspección Bomberos</title>
<style>
body{font-family:Arial;background:#f5f5f5;padding:20px}
.card{background:white;padding:20px;border-radius:10px;max-width:400px;margin:auto}
input{width:100%;padding:10px;margin:5px 0}
button{background:red;color:white;padding:10px;border:none;width:100%}
</style>
</head>
<body>

<div class="card" id="login">
<h2>Login Inspección</h2>
<input type="text" id="user" placeholder="Usuario">
<input type="password" id="pass" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
<p id="msg"></p>
</div>

<div class="card" id="panel" style="display:none">
<h2>Panel Principal</h2>
<p>Bienvenido</p>
<button onclick="logout()">Cerrar sesión</button>
</div>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [
{user:"admin",pass:"1996",rol:"admin"}
];

function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

let found=users.find(x=>x.user==u && x.pass==p);

if(found){
localStorage.setItem("session",u);
document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";
}else{
document.getElementById("msg").innerText="Datos incorrectos";
}
}

function logout(){
localStorage.removeItem("session");
location.reload();
}

if(localStorage.getItem("session")){
document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";
}
</script>

</body>
</html>
