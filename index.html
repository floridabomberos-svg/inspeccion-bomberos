<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inspección Bomberos</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d32f2f">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;padding:0}
.container{max-width:500px;margin:20px auto;background:white;padding:20px;border-radius:8px}
input,textarea,select{width:100%;padding:10px;margin-top:8px}
button{width:100%;padding:12px;margin-top:10px;background:red;color:white;border:none}
#panel{display:none}
canvas{border:1px solid #000;width:100%;height:200px}
img{width:100%;margin-top:10px}
</style>

</head>
<body>

<div class="container" id="login">
<h2>Login</h2>
<input type="text" id="usuario" placeholder="Usuario">
<input type="password" id="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
</div>

<div class="container" id="panel">
<h2>Nueva Inspección</h2>

<input id="nombre" placeholder="Nombre establecimiento">
<input id="direccion" placeholder="Dirección">
<input id="responsable" placeholder="Responsable">
<input id="telefono" placeholder="Teléfono">

<label>Extintores</label>
<select id="extintores">
<option>SI</option>
<option>NO</option>
</select>

<label>Salidas de emergencia</label>
<select id="salidas">
<option>SI</option>
<option>NO</option>
</select>

<label>Observaciones</label>
<textarea id="obs"></textarea>

<label>Foto</label>
<input type="file" accept="image/*" capture="camera" id="foto">
<img id="preview">

<label>Firma</label>
<canvas id="firma" width="400" height="200"></canvas>
<button onclick="limpiarFirma()">Limpiar firma</button>

<button onclick="guardar()">Guardar inspección</button>
<button onclick="logout()">Cerrar sesión</button>

<h3>Inspecciones guardadas</h3>
<div id="lista"></div>

</div>
