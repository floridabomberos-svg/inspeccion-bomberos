<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inspección Bomberos</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#d32f2f">

<style>
body{font-family:Arial;background:#f5f5f5;margin:0;padding:0}
.container{max-width:500px;margin:20px auto;background:white;padding:20px;border-radius:8px}
input,textarea,select{width:100%;padding:10px;margin-top:8px}
button{width:100%;padding:12px;margin-top:10px;background:red;color:white;border:none}
#panel{display:none}
canvas{border:1px solid #000;width:100%;height:200px}
img{width:100%;margin-top:10px}
</style>

</head>
<body>

<div class="container" id="login">
<h2>Login</h2>
<input type="text" id="usuario" placeholder="Usuario">
<input type="password" id="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
</div>

<div class="container" id="panel">
<h2>Nueva Inspección</h2>

<input id="nombre" placeholder="Nombre establecimiento">
<input id="direccion" placeholder="Dirección">
<input id="responsable" placeholder="Responsable">
<input id="telefono" placeholder="Teléfono">

<label>Extintores</label>
<select id="extintores">
<option>SI</option>
<option>NO</option>
</select>

<label>Salidas de emergencia</label>
<select id="salidas">
<option>SI</option>
<option>NO</option>
</select>

<label>Observaciones</label>
<textarea id="obs"></textarea>

<label>Foto</label>
<input type="file" accept="image/*" capture="camera" id="foto">
<img id="preview">

<label>Firma</label>
<canvas id="firma" width="400" height="200"></canvas>
<button onclick="limpiarFirma()">Limpiar firma</button>

<button onclick="guardar()">Guardar inspección</button>
<button onclick="logout()">Cerrar sesión</button>

<h3>Inspecciones guardadas</h3>
<div id="lista"></div>

</div>

<script>

let canvas, ctx, dibujando=false;

window.onload=function(){

canvas=document.getElementById("firma");
ctx=canvas.getContext("2d");

canvas.addEventListener("mousedown",iniciar);
canvas.addEventListener("mouseup",detener);
canvas.addEventListener("mousemove",dibujar);

canvas.addEventListener("touchstart",iniciarTouch);
canvas.addEventListener("touchend",detener);
canvas.addEventListener("touchmove",dibujarTouch);

document.getElementById("foto").addEventListener("change",function(e){
let reader=new FileReader();
reader.onload=function(){
document.getElementById("preview").src=reader.result;
}
reader.readAsDataURL(e.target.files[0]);
});

}

function iniciar(){dibujando=true}
function detener(){dibujando=false;ctx.beginPath()}

function dibujar(e){
if(!dibujando) return;
ctx.lineWidth=2;
ctx.lineCap="round";
ctx.lineTo(e.offsetX,e.offsetY);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(e.offsetX,e.offsetY);
}

function iniciarTouch(e){
e.preventDefault();
dibujando=true;
}

function dibujarTouch(e){
e.preventDefault();
if(!dibujando) return;

let rect=canvas.getBoundingClientRect();
let x=e.touches[0].clientX-rect.left;
let y=e.touches[0].clientY-rect.top;

ctx.lineWidth=2;
ctx.lineCap="round";
ctx.lineTo(x,y);
ctx.stroke();
ctx.beginPath();
ctx.moveTo(x,y);
}

function limpiarFirma(){
ctx.clearRect(0,0,canvas.width,canvas.height);
}

function login(){
let user=document.getElementById("usuario").value;
let pass=document.getElementById("password").value;

if(user==="admin" && pass==="1996"){
document.getElementById("login").style.display="none";
document.getElementById("panel").style.display="block";
mostrar();
}else{
alert("Usuario incorrecto");
}
}

function logout(){
location.reload();
}

function guardar(){
let data=JSON.parse(localStorage.getItem("inspecciones")||"[]");

let item={
fecha:new Date().toLocaleString(),
nombre:nombre.value,
direccion:direccion.value,
responsable:responsable.value,
telefono:telefono.value,
extintores:extintores.value,
salidas:salidas.value,
obs:obs.value,
foto:preview.src,
firma:canvas.toDataURL()
};

data.push(item);
localStorage.setItem("inspecciones",JSON.stringify(data));
mostrar();
alert("Guardado correctamente");
}

function mostrar(){
let data=JSON.parse(localStorage.getItem("inspecciones")||"[]");
lista.innerHTML="";
data.forEach(i=>{
lista.innerHTML+=`
<div style="border:1px solid #ccc;padding:10px;margin-top:5px">
<b>${i.nombre}</b><br>
${i.fecha}<br>
${i.direccion}
</div>`;
});
}

</script>

</body>
</html>
