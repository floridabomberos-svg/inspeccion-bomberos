<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspección</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f5f5f5;
color:#000;
}

header{
background:#c62828;
color:#fff;
padding:15px;
text-align:center;
font-size:20px;
}

.navbar{
background:#b71c1c;
color:white;
padding:10px;
display:flex;
justify-content:space-between;
}

.menu-btn{
font-size:22px;
cursor:pointer;
}

.dropdown{
position:absolute;
top:95px;
left:10px;
background:white;
width:220px;
border-radius:8px;
box-shadow:0 3px 8px rgba(0,0,0,0.3);
display:none;
z-index:1000;
}

.dropdown button{
background:white;
color:black;
border:none;
padding:12px;
width:100%;
text-align:left;
}

.card{
background:white;
margin:15px;
padding:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}

input,select,textarea{
width:100%;
padding:8px;
margin-bottom:10px;
border:1px solid #ccc;
border-radius:5px;
color:black;
}

button{
background:#c62828;
color:white;
border:none;
padding:10px;
border-radius:5px;
width:100%;
}

.hidden{display:none;}
h3{margin-top:25px;}
</style>
</head>

<body>

<header>APP INSPECCIÓN</header>

<div id="login" class="card">
<h3>Iniciar sesión</h3>
<input id="usuario" placeholder="Usuario">
<input id="password" type="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
</div>

<div id="app" class="hidden">

<div class="navbar">
<span class="menu-btn" onclick="toggleMenu()">☰</span>
<span>Panel</span>
</div>

<div id="menu" class="dropdown">
<button onclick="mostrar('form')">Nueva inspección</button>
<button onclick="mostrar('lista')">Registros</button>
<button onclick="logout()">Cerrar sesión</button>
</div>

<div id="form" class="card hidden">

<h3>Datos del establecimiento</h3>
<input id="razon" placeholder="Razón social">
<input id="nit" placeholder="NIT">
<input id="direccion" placeholder="Dirección">
<input id="barrio" placeholder="Barrio">
<input id="telefono" placeholder="Teléfono">
<input id="correo" placeholder="Correo electrónico">
<input id="actividad" placeholder="Actividad comercial">
<input id="empleados" placeholder="Número de empleados">
<input id="aforo" placeholder="Aforo">

<h3>Ruta de evacuación</h3>
<select id="ruta1"><option>Señalizada SI</option><option>NO</option></select>
<select id="ruta2"><option>Iluminada SI</option><option>NO</option></select>
<select id="ruta3"><option>Despejada SI</option><option>NO</option></select>

<h3>Extintores</h3>
<input id="extintores" placeholder="Cantidad">
<select id="ext_senal"><option>Señalizados SI</option><option>NO</option></select>
<input id="ext_vig" placeholder="Vigencia">

<h3>Instalaciones eléctricas</h3>
<select id="retie"><option>Certificado RETIE SI</option><option>NO</option></select>
<select id="conte"><option>Certificado CONTE SI</option><option>NO</option></select>
<select id="cable"><option>Cable expuesto SI</option><option>NO</option></select>

<h3>Señalización</h3>
<select id="senal1"><option>Visible SI</option><option>NO</option></select>
<select id="senal2"><option>Fotoluminiscente SI</option><option>NO</option></select>
<select id="senal3"><option>Tamaño adecuado SI</option><option>NO</option></select>

<h3>Salida de emergencia</h3>
<select id="salida1"><option>Señalizada SI</option><option>NO</option></select>
<select id="salida2"><option>Abre hacia afuera SI</option><option>NO</option></select>
<select id="salida3"><option>Iluminación emergencia SI</option><option>NO</option></select>

<h3>Botiquín</h3>
<select id="botiquin"><option>SI</option><option>NO</option></select>

<h3>Brigada de emergencia</h3>
<select id="brigada"><option>SI</option><option>NO</option></select>

<h3>Red contra incendios</h3>
<select id="red"><option>SI</option><option>NO</option></select>

<h3>Observaciones</h3>
<textarea id="obs"></textarea>

<h3>Concepto final</h3>
<select id="concepto">
<option>APROBADO</option>
<option>NO APROBADO</option>
</select>

<button onclick="guardar()">Guardar inspección</button>

</div>

<div id="lista" class="card">
<h3>Registros</h3>
<ul id="datos"></ul>
</div>

</div>

<script>

const USER="jvv";
const PASS="1996";

function login(){
let u=usuario.value.trim();
let p=password.value.trim();

if(u===USER && p===PASS){
login.classList.add("hidden");
app.classList.remove("hidden");
}else{
alert("Datos incorrectos");
}
}

function logout(){
app.classList.add("hidden");
login.classList.remove("hidden");
}

function toggleMenu(){
menu.style.display=menu.style.display=="block"?"none":"block";
}

function mostrar(id){
form.classList.add("hidden");
lista.classList.add("hidden");
document.getElementById(id).classList.remove("hidden");
}

function guardar(){

let datos=JSON.parse(localStorage.getItem("inspecciones")||"[]");

let registro={
razon:razon.value,
nit:nit.value,
direccion:direccion.value,
actividad:actividad.value,
concepto:concepto.value
};

datos.push(registro);

localStorage.setItem("inspecciones",JSON.stringify(datos));

alert("Guardado correctamente");
cargar();
mostrar("lista");
}

function cargar(){

let datosLS=JSON.parse(localStorage.getItem("inspecciones")||"[]");

datos.innerHTML="";

datosLS.forEach(d=>{
let li=document.createElement("li");
li.textContent=d.razon+" - "+d.concepto;
datos.appendChild(li);
});
}

cargar();

</script>

</body>
</html>
