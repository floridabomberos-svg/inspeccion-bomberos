<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspección</title>
<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f5f5f5;
}
header{
    background:#c62828;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
}

/* BARRA SUPERIOR */
.navbar{
    background:#b71c1c;
    color:white;
    padding:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.menu-btn{
    font-size:22px;
    cursor:pointer;
}

.dropdown{
    position:absolute;
    top:100px;
    left:10px;
    background:white;
    width:200px;
    border-radius:8px;
    box-shadow:0 3px 8px rgba(0,0,0,0.3);
    display:none;
    z-index:1000;
}

.dropdown button{
    width:100%;
    border:none;
    padding:12px;
    text-align:left;
    background:white;
    cursor:pointer;
}

.dropdown button:hover{
    background:#f1f1f1;
}

#login, #app{
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
    margin-bottom:15px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0 10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    background:#c62828;
    color:white;
    border:none;
    padding:10px;
    border-radius:5px;
    width:100%;
    font-size:16px;
    cursor:pointer;
}

.logout{
    background:#444;
}

.hidden{
    display:none;
}
</style>
</head>
<body>

<header>APP INSPECCIÓN</header>

<div id="login">
    <div class="card">
        <h3>Iniciar Sesión</h3>
        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()">Ingresar</button>
    </div>
</div>

<div id="app" class="hidden">

    <div class="navbar">
        <span class="menu-btn" onclick="toggleMenu()">☰</span>
        <span>Panel</span>
    </div>

    <div id="dropdown" class="dropdown">
        <button onclick="mostrar('inspeccion');toggleMenu()">Nueva Inspección</button>
        <button onclick="mostrar('lista');toggleMenu()">Ver Registros</button>
        <button onclick="logout()">Cerrar Sesión</button>
    </div>

    <div id="inspeccion" class="card hidden">
        <h3>Nueva Inspección</h3>
        <input type="text" id="nombre" placeholder="Nombre del establecimiento">
        <input type="text" id="direccion" placeholder="Dirección">
        <button onclick="guardar()">Guardar</button>
    </div>

    <div id="lista" class="card">
        <h3>Registros</h3>
        <ul id="datos"></ul>
    </div>

</div>

<script>
const USER = "jvv";
const PASS = "1996";

function login(){
    let u = document.getElementById('usuario').value;
    let p = document.getElementById('password').value;

    if(u === USER && p === PASS){
        document.getElementById('login').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
    }else{
        alert('Datos incorrectos');
    }
}

function logout(){
    document.getElementById('app').classList.add('hidden');
    document.getElementById('login').classList.remove('hidden');
}

function toggleMenu(){
    let menu = document.getElementById('dropdown');
    menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}

function mostrar(id){
    document.getElementById('inspeccion').classList.add('hidden');
    document.getElementById('lista').classList.add('hidden');
    document.getElementById(id).classList.remove('hidden');
}

function guardar(){
    let nombre = document.getElementById('nombre').value;
    let direccion = document.getElementById('direccion').value;

    if(nombre === ""){
        alert('Ingrese nombre');
        return;
    }

    let datos = JSON.parse(localStorage.getItem('inspecciones') || '[]');
    datos.push({nombre, direccion});
    localStorage.setItem('inspecciones', JSON.stringify(datos));

    document.getElementById('nombre').value = "";
    document.getElementById('direccion').value = "";

    alert('Guardado');
    cargar();
    mostrar('lista');
}

function cargar(){
    let datos = JSON.parse(localStorage.getItem('inspecciones') || '[]');
    let lista = document.getElementById('datos');
    lista.innerHTML = '';

    datos.forEach(d => {
        let li = document.createElement('li');
        li.textContent = d.nombre + ' - ' + d.direccion;
        lista.appendChild(li);
    });
}

cargar();
</script>

</body>
</html>
