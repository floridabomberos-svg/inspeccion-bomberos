<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspección Bomberos</title>

<style>
body{font-family:Arial;margin:0;background:#f0f0f0}
.header{background:#d32f2f;color:white;padding:15px;text-align:center;font-weight:bold;font-size:18px}
.container{padding:15px}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:10px;box-shadow:0 2px 5px rgba(0,0,0,0.2)}
input,textarea,select{width:100%;padding:10px;margin-top:5px;border-radius:6px;border:1px solid #ccc;box-sizing:border-box}
button{padding:10px;border:none;border-radius:6px;background:#d32f2f;color:white;margin-top:5px}
.btn-float{position:fixed;bottom:20px;right:20px;background:#d32f2f;color:white;width:60px;height:60px;border-radius:50%;font-size:30px;border:none}
.estado{padding:5px 10px;border-radius:5px;color:white;font-size:12px;float:right}
.Pendiente{background:orange}
.Aprobado{background:green}
.Rechazado{background:red}
#panel{display:none}
</style>

</head>
<body>

<div class="header">INSPECCIÓN BOMBEROS</div>

<div class="container" id="loginBox">
<div class="card">
<h3>Login</h3>
<input type="text" id="usuario" placeholder="Usuario">
<input type="password" id="password" placeholder="Contraseña">
<button onclick="login()">Ingresar</button>
</div>
</div>

<div class="container" id="panel">

<div class="card">
<h3>Nueva Inspección</h3>

<input id="nombre" placeholder="Nombre establecimiento">
<input id="direccion" placeholder="Dirección">
<input id="responsable" placeholder="Responsable">
<input id="telefono" placeholder="Teléfono">

<button onclick="guardar()">Guardar</button>
</div>

<input type="text" id="buscar" placeholder="Buscar..." onkeyup="filtrar()">

<h3>Inspecciones</h3>
<div id="lista"></div>

</div>

<button class="btn-float" onclick="window.scrollTo({top:0,behavior:'smooth'})">+</button>

<script>

function login(){
let user=document.getElementById("usuario").value;
let pass=document.getElementById("password").value;

if(user==="admin" && pass==="1996"){
document.getElementById("loginBox").style.display="none";
document.getElementById("panel").style.display="block";
mostrar();
}else{
alert("Usuario o contraseña incorrectos");
}
}

function guardar(){

navigator.geolocation.getCurrentPosition(function(pos){

let data=JSON.parse(localStorage.getItem("inspecciones")||"[]");

let item={
id:Date.now(),
numero:data.length+1,
nombre:nombre.value,
direccion:direccion.value,
responsable:responsable.value,
telefono:telefono.value,
estado:"Pendiente",
lat:pos.coords.latitude,
lng:pos.coords.longitude,
fecha:new Date().toLocaleString()
};

data.push(item);
localStorage.setItem("inspecciones",JSON.stringify(data));
mostrar();

});
}

function mostrar(){

let data=JSON.parse(localStorage.getItem("inspecciones")||"[]");
lista.innerHTML="";

data.slice().reverse().forEach(i=>{

lista.innerHTML+=`
<div class="card">
<span class="estado ${i.estado}">${i.estado}</span>

<b>#${i.numero} - ${i.nombre}</b><br>
${i.direccion}<br>
${i.fecha}<br>

<button onclick="aprobar(${i.id})">Aprobar</button>
<button onclick="rechazar(${i.id})">Rechazar</button>
<button onclick="editar(${i.id})">Editar</button>
<button onclick="eliminar(${i.id})">Eliminar</button>

</div>
`;

});
}

function eliminar(id){
let data=JSON.parse(localStorage.getItem("inspecciones")||"[]");
data=data.filter(i=>i.id!=id);
localStorage.setItem("inspecciones",JSON.stringify(data));
mostrar();
}

function aprobar(id){cambiarEstado(id,"Aprobado")}
function rechazar(id){cambiarEstado(id,"Rechazado")}

function cambiarEstado(id,estado){
let data=JSON.parse(localStorage.getItem("inspecciones")||"[]");
data.forEach(i=>{
if(i.id==id) i.estado=estado;
});
localStorage.setItem("inspecciones",JSON.stringify(data));
mostrar();
}

function editar(id){
let data=JSON.parse(localStorage.getItem("inspecciones")||"[]");
let i=data.find(x=>x.id==id);

nombre.value=i.nombre;
direccion.value=i.direccion;
responsable.value=i.responsable;
telefono.value=i.telefono;

eliminar(id);
window.scrollTo({top:0});
}

function filtrar(){
let texto=buscar.value.toLowerCase();
let cards=document.querySelectorAll(".card");

cards.forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(texto) ? "block" : "none";
});
}

</script>

</body>
</html>
