<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspección</title>
<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f5f5f5;
}
header{
    background:#c62828;
    color:white;
    padding:15px;
    text-align:center;
    font-size:20px;
}
#login, #app{
    padding:20px;
}
.card{
    background:white;
    padding:15px;
    border-radius:8px;
    box-shadow:0 2px 5px rgba(0,0,0,0.2);
    margin-bottom:15px;
}
input{
    width:100%;
    padding:10px;
    margin:5px 0 10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}
button{
    background:#c62828;
    color:white;
    border:none;
    padding:10px;
    border-radius:5px;
    width:100%;
    font-size:16px;
    cursor:pointer;
}
.menu button{
    margin-bottom:10px;
}
.logout{
    background:#444;
}
.hidden{
    display:none;
}

/* BOTON FLOTANTE + */
.fab{
    position:fixed;
    bottom:20px;
    right:20px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:#c62828;
    color:white;
    font-size:30px;
    border:none;
    box-shadow:0 3px 6px rgba(0,0,0,0.3);
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}

</style>
</head>
<body>

<header>APP INSPECCIÓN</header>

<div id="login">
    <div class="card">
        <h3>Iniciar Sesión</h3>
        <input type="text" id="usuario" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        <button onclick="login()">Ingresar</button>
    </div>
</div>

<div id="app" class="hidden">
    <div class="card menu">
        <h3>Menú Principal</h3>
        <button onclick="mostrar('lista')">Ver Registros</button>
        <button class="logout" onclick="logout()">Cerrar Sesión</button>
    </div>

    <div id="inspeccion" class="card hidden">
        <h3>Nueva Inspección</h3>
        <input type="text" id="nombre" placeholder="Nombre del establecimiento">
        <input type="text" id="direccion" placeholder="Dirección">
        <button onclick="guardar()">Guardar</button>
    </div>

    <div id="lista" class="card">
        <h3>Registros</h3>
        <ul id="datos"></ul>
    </div>
</div>

<!-- BOTON MAS -->
<button class="fab" onclick="mostrar('inspeccion')">+</button>

<script>
const USER = "jvv";
const PASS = "1996";

function login(){
    let u = document.getElementById('usuario').value;
    let p = document.getElementById('password').value;

    if(u === USER && p === PASS){
        document.getElementById('login').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
    }else{
        alert('Datos incorrectos');
    }
}

function logout(){
    document.getElementById('app').classList.add('hidden');
    document.getElementById('login').classList.remove('hidden');
}

function mostrar(id){
    document.getElementById('inspeccion').classList.add('hidden');
    document.getElementById('lista').classList.add('hidden');
    document.getElementById(id).classList.remove('hidden');
}

function guardar(){
    let nombre = document.getElementById('nombre').value;
    let direccion = document.getElementById('direccion').value;

    if(nombre === ""){
        alert('Ingrese nombre');
        return;
    }

    let datos = JSON.parse(localStorage.getItem('inspecciones') || '[]');
    datos.push({nombre, direccion});
    localStorage.setItem('inspecciones', JSON.stringify(datos));

    document.getElementById('nombre').value = "";
    document.getElementById('direccion').value = "";

    alert('Guardado');
    cargar();
    mostrar('lista');
}

function cargar(){
    let datos = JSON.parse(localStorage.getItem('inspecciones') || '[]');
    let lista = document.getElementById('datos');
    lista.innerHTML = '';

    datos.forEach(d => {
        let li = document.createElement('li');
        li.textContent = d.nombre + ' - ' + d.direccion;
        lista.appendChild(li);
    });
}

cargar();
</script>

</body>
</html>
